name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.94.0"
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: Run cargo-audit
        # Keep the ignore list in lockstep with the workspace standard
        # `kb/Standards/Extension Release Checklist.md` §5. Each ignore needs
        # a follow-up in `kb/Planning/` — these are not free-pass exemptions.
        run: >
          cargo audit --deny warnings
          --ignore RUSTSEC-2023-0071
          --ignore RUSTSEC-2023-0089
          --ignore RUSTSEC-2024-0384
          --ignore RUSTSEC-2024-0436
          --ignore RUSTSEC-2025-0012
          --ignore RUSTSEC-2025-0134
          --ignore RUSTSEC-2025-0141
          --ignore RUSTSEC-2026-0002
          --ignore RUSTSEC-2021-0141

  secrets:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install and run gitleaks
        run: |
          GITLEAKS_VERSION="8.27.2"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --verbose
